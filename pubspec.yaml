name: vital_track
description: "VitalTrack: Health & AI Assistant for daily biometric tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0

  # State Management (Riverpod)
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local Persistence (Drift)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # Health & Background Tasks
  health: ^13.3.1
  shared_preferences: ^2.2.3
  workmanager: ^0.9.0+3

  # Navigation
  go_router: ^17.2.3

  # UI & Styling
  skeletonizer: ^2.1.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8

  # Functional & Models
  meta: ^1.15.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generators
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  flutter_gen_runner: ^5.14.0

  # Utilities & Testing
  mocktail: ^1.0.4
  flutter_native_splash: 2.4.7
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  generate: true # For l10n

  assets:
    - assets/
    - assets/launcher_icon/
    - assets/native_splash/

flutter_gen:
  output: lib/core/constants/
  line_length: 80
  integrations:
    flutter_svg: true

# Specific configurations for splash and icons as per context.md
flutter_native_splash:
  color: "#4caf50"
  image: assets/native_splash/splash.png
  android_12:
    image: assets/native_splash/splash.png
    color: "#4caf50"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon/icon.png"
